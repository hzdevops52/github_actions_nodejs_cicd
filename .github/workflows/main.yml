name: nodejs CICD

on: 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: install nodejs
        uses: actions/setup-node@v4

      - name: install pkgs
        run: npm install

      - name: testing
        run:  npm test

      - name: build app
        run: npm run build
